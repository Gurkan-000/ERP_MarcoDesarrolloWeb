<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP - Inicio</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
        <div class="app-root">
    <section id="erp-app" class="erp-app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon" aria-hidden="true"><i data-lucide="shopping-bag"></i></div>
          <div>
            <h2>Lo Esencial</h2>
            <p>ERP Broasteria</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <th:block th:if="${usuarioSesion != null}" th:each="vista : ${usuarioSesion.vistas}">
            <a class="nav-item" th:href="@{/api/venta/vista}" th:if="${vista == 'venta'}">
              <i data-lucide="shopping-bag"></i>
              Punto de Venta
            </a>
            <a class="nav-item" th:href="@{/api/caja/vista}" th:if="${vista == 'caja'}">
              <i data-lucide="wallet"></i>
              Caja
            </a>
            <a class="nav-item active" th:href="@{/api/inventario/vista}" th:if="${vista == 'inventario'}">
              <i data-lucide="package"></i>
              Inventario
            </a>
            <a class="nav-item" th:href="@{/api/catalogo/vistaProducto}" th:if="${vista == 'catalogo'}">
              <i data-lucide="layout-dashboard"></i>
              Catalogo
            </a>
            <a class="nav-item" th:href="@{/api/usuario/vista}" th:if="${vista == 'usuario'}">
              <i data-lucide="users"></i>
              Usuarios
            </a>
            <a class="nav-item" th:href="@{/api/configuracion/vista}" th:if="${vista == 'configuracion'}">
              <i data-lucide="settings"></i>
              Configuraciones
            </a>
          </th:block>
        </nav>

        <div class="sidebar-footer">
          <div class="user-chip">
            <div class="user-avatar" th:text="${#strings.substring(usuarioSesion.nombre,0,1)}">A</div>
            <div class="user-meta">
              <p th:text="${usuarioSesion.nombre}">Usuario</p>
              <span>Usuario</span>
            </div>
          </div>
          <form th:action="@{/api/login/vista}" method="get">
            <button type="submit" class="btn btn-ghost">
              <i data-lucide="log-out"></i>
              Cerrar Sesión
            </button>
          </form>
        </div>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <h2>Inventario</h2>
          <p id="today-date"></p>
        </header>

        <main class="content-area">
         <section class="module active">
            <div class="module-header">
              <div class="tab-row">
                <button class="tab active" data-tab="inv-stock">Stock Actual</button>
                <button class="tab" data-tab="inv-actualizar">Actualizar Stock</button>
              </div>
            </div>

            <div class="tab-content active" id="inv-stock">
              <div class="card">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Producto</th>
                      <th>Stock</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="producto:${productos}">
                      <td th:text="${producto.nombre}"></td>
                      <td th:text="${producto.stock}"></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div class="tab-content" id="inv-actualizar">
              <div class="card">
                <form th:action="@{/api/inventario/stock/guardar}" method="post">
                  <table class="data-table stock-editor-table">
                    <thead>
                      <tr>
                        <th>Producto</th>
                        <th>Stock actual</th>
                        <th>Nuevo stock</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="producto:${productos}">
                        <td th:text="${producto.nombre}"></td>
                        <td th:text="${producto.stock}"></td>
                        <td>
                          <input type="hidden" name="productoNombre" th:value="${producto.nombre}" />
                          <input type="number" min="0" class="stock-spinner" name="nuevoStock"
                            th:value="${producto.stock}" />
                        </td>
                      </tr>
                    </tbody>
                  </table>
                  <div class="form-actions form-actions-end">
                    <button class="btn btn-primary" type="submit">Guardar cambios</button>
                  </div>
                </form>
              </div>
            </div>
          </section>
        </main>
      </div>
    </section>
  </div>

    <script src="https://unpkg.com/lucide@latest"></script>
  <script th:src="@{/js/app.js}" defer></script>

</body>
</html>
