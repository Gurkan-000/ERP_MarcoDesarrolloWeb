<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP - Inicio</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
<body>
    
    <div class="app-root">

    <section id="login-screen" class="login-screen">
      
      <div class="login-card">
        <div class="login-brand">
          <div class="login-icon" aria-hidden="true">
            <i data-lucide="lock"></i>
          </div>
          <h1>Lo Esencial ERP</h1>
          <p>Ingresa tus credenciales</p>
        </div>

        <form th:action="@{/api/user/autenticar}" th:object="${usuario}" method="post" class="login-form">
          <div class="input-group">
            <span class="input-icon" aria-hidden="true"><i data-lucide="user"></i></span>
            <input type="text" placeholder="Usuario" autocomplete="username" th:field="*{nombre}" required/>
          </div>
          <div class="input-group">
            <span class="input-icon" aria-hidden="true"><i data-lucide="key-round"></i></span>
            <input type="password" placeholder="Contraseña" autocomplete="current-password" th:field="*{contraseña}" required/>
          </div>
          <p id="login-error" class="form-error" aria-live="polite"></p>
          <button class="btn btn-primary" type="submit">
            <span class="btn-spinner" aria-hidden="true"></span>
            Ingresar
          </button>
        </form>

    </section>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script th:src="@{/js/login.js}" defer></script>

</body>
</html>
