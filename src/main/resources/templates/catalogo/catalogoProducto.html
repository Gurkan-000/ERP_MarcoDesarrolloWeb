<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP - Inicio</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
    <div class="app-root">
    <section id="erp-app" class="erp-app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon" aria-hidden="true"><i data-lucide="shopping-bag"></i></div>
          <div>
            <h2>Lo Esencial</h2>
            <p>ERP Broasteria</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a class="nav-item" th:href="@{/api/venta/vista}" data-roles="Mesero,Cajero,Administrador">
            <i data-lucide="shopping-bag"></i>
            Punto de Venta
          </a>
          <a class="nav-item" th:href="@{/api/caja/vista}" data-roles="Cajero,Administrador">
            <i data-lucide="wallet"></i>
            Caja
          </a>
          <a class="nav-item" th:href="@{/api/inventario/vista}" data-roles="Administrador">
            <i data-lucide="package"></i>
            Inventario
          </a>
          <a class="nav-item active" th:href="@{/api/catalogo/vistaProducto}" data-roles="Administrador">
            <i data-lucide="layout-dashboard"></i>
            Catalogo
          </a>
          <a class="nav-item" th:href="@{/api/usuario/vista}" data-roles="Administrador">
            <i data-lucide="users"></i>
            Usuarios
          </a>
          <a class="nav-item" th:href="@{/api/configuracion/vista}" data-roles="Administrador">
            <i data-lucide="settings"></i>
            Configuraciones
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="user-chip">
            <div class="user-avatar">A</div>
            <div class="user-meta">
              <p>Ana Torres</p>
              <span>Administrador</span>
            </div>
          </div>
          <form th:action="@{/api/login/vista}" method="get">
            <button type="submit" class="btn btn-ghost">
              <i data-lucide="log-out"></i>
              Cerrar Sesión
            </button>
          </form>
        </div>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <h2>Catalogo</h2>
          <p id="today-date"></p>
        </header>

        <main class="content-area">
                    <section id="module-catalogo" class="module active">
            <div class="module-header">
              <div class="tab-row">
                <a class="tab active" data-tab="cat-productos" th:href="@{/api/catalogo/vistaProducto}">
                  <i data-lucide="package"></i>Productos
                </a>
                <a class="tab" data-tab="cat-categorias" th:href="@{/api/catalogo/vistaCategoria}">
                  <i data-lucide="layers"></i>Categorias
                </a>
              </div>
              <div class="catalog-actions">
                <button class="btn btn-primary catalog-action" type="button" data-action="open-form"
                  data-target="cat-productos">
                  <i data-lucide="plus"></i>
                  Nuevo producto
                </button>
              </div>
            </div>
            <div class="tab-content active" id="cat-productos">
              <div class="card">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Producto</th>
                      <th>Categoria</th>
                      <th>Precio</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="producto:${productos}">
                      <td th:text="${producto.nombre}"></td>
                      <td th:text="${producto.categoria != null ? producto.categoria.nombre : 'Sin categoria'}"></td>
                      <td th:text="${producto.precio}"></td>
                    </tr>
                  </tbody>
                </table>
                <form class="inline-form hidden" id="form-cat-productos" th:action="@{/api/catalogo/crearProducto}"
                  th:object="${producto}" method="post">
                  <div class="form-grid">
                    <label class="field">
                      <span>Producto</span>
                      <input type="text" placeholder="Ej. Combo Clasico" th:field="*{nombre}" />
                    </label>
                    <label class="field">
                      <span>Categoria</span>
                      <select name="categoriaNombre">
                        <option value="" disabled selected>Seleccione una categoria</option>
                        <option th:each="categoria : ${categorias}" th:value="${categoria.nombre}"
                          th:text="${categoria.nombre}"></option>
                      </select>
                    </label>
                    <label class="field">
                      <span>Precio</span>
                      <input type="number" step="0.1" placeholder="Ej. 18.90" th:field="*{precio}" />
                    </label>
                    <label class="field">
                      <span>Stock</span>
                      <input type="number" placeholder="Ej. 10" th:field="*{stock}" />
                    </label>
                  </div>
                  <div class="form-actions">
                    <button class="btn btn-primary" type="submit">Guardar</button>
                    <button class="btn btn-muted" type="button" data-action="cancel-form">Cancelar</button>
                  </div>
                </form>
              </div>
            </div>
          </section>
        </main>
      </div>
    </section>
  </div>

    <script src="https://unpkg.com/lucide@latest"></script>
  <script th:src="@{/js/app.js}" defer></script>

</body>
</html>
