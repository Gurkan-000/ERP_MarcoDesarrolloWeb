<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP - Inicio</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
    <div class="app-root">
    <section id="erp-app" class="erp-app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon" aria-hidden="true"><i data-lucide="shopping-bag"></i></div>
          <div>
            <h2>Lo Esencial</h2>
            <p>ERP Broasteria</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <th:block th:if="${usuarioSesion != null}" th:each="vista : ${usuarioSesion.vistas}">
            <a class="nav-item" th:href="@{/api/venta/vista}" th:if="${vista == 'venta'}">
              <i data-lucide="shopping-bag"></i>
              Punto de Venta
            </a>
            <a class="nav-item" th:href="@{/api/caja/vista}" th:if="${vista == 'caja'}">
              <i data-lucide="wallet"></i>
              Caja
            </a>
            <a class="nav-item" th:href="@{/api/inventario/vista}" th:if="${vista == 'inventario'}">
              <i data-lucide="package"></i>
              Inventario
            </a>
            <a class="nav-item" th:href="@{/api/catalogo/vistaProducto}" th:if="${vista == 'catalogo'}">
              <i data-lucide="layout-dashboard"></i>
              Catalogo
            </a>
            <a class="nav-item" th:href="@{/api/usuario/vista}" th:if="${vista == 'usuario'}">
              <i data-lucide="users"></i>
              Usuarios
            </a>
            <a class="nav-item active" th:href="@{/api/configuracion/vista}" th:if="${vista == 'configuracion'}">
              <i data-lucide="settings"></i>
              Configuraciones
            </a>
          </th:block>
        </nav>

        <div class="sidebar-footer">
          <div class="user-chip">
            <div class="user-avatar" th:text="${#strings.substring(usuarioSesion.nombre,0,1)}">A</div>
            <div class="user-meta">
              <p th:text="${usuarioSesion.nombre}">Usuario</p>
              <span>Usuario</span>
            </div>
          </div>
          <form th:action="@{/api/login/vista}" method="get">
            <button type="submit" class="btn btn-ghost">
              <i data-lucide="log-out"></i>
              Cerrar Sesión
            </button>
          </form>
        </div>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <h2>Configuraciones</h2>
          <p id="today-date"></p>
        </header>

        <main class="content-area">
          <section class="module active">
            <div class="card danger-zone">
              <div>
                <h3>Zona de Peligro</h3>
                <p>Reiniciar inventario</p>
              </div>
              <form id="reset-form" th:action="@{/api/inventario/reiniciar}" method="post">
                <button class="btn btn-danger" id="open-reset" type="button">Reiniciar Inventario</button>
              </form>
            </div>
          </section>
        </main>
      </div>
    </section>
  </div>

  <div id="reset-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-icon" aria-hidden="true"><i data-lucide="alert-octagon"></i></div>
      <h3>Estas totalmente seguro?</h3>
      <p>Esta accion elimina el historial operativo de inventario.</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirm-reset">Si, borrar historial</button>
        <button class="btn btn-muted" id="cancel-reset">Cancelar</button>
      </div>
    </div>
  </div>

    <script src="https://unpkg.com/lucide@latest"></script>
  <script th:src="@{/js/app.js}" defer></script>

</body>
</html>
